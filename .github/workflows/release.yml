name: Build & Publish Container

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout the repo
      - uses: actions/checkout@v4

      # 2. Log in to GHCR
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build the container image
      - run: |
          docker build -f Containerfile -t ghcr.io/the127/keyline-docs:${{ github.ref_name }} .

      # 4. Push the container image
      - run: |
          docker push ghcr.io/the127/keyline-docs:${{ github.ref_name }}
